<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffet Experience | Links Oficiais</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="recursos/style.css">
</head>
<body>

    <main class="container">
        <header class="header animate-in">
            <img src="recursos/logo.png" alt="Logo Buffet" class="logo">
        </header>

        <section class="slogan animate-in">
            <h1>Transformando sonhos em memórias inesquecíveis.</h1>
            <p>Seja bem-vindo à nossa experiência gastronômica e festiva.</p>
        </section>

        <nav class="links-nav">
            <a href="https://instagram.com/seuusuario" class="link-card animate-in">
                <i class="fa-brands fa-instagram icon"></i>
                <span>Instagram</span>
            </a>
            
            <a href="#" class="link-card animate-in">
                <i class="fa-solid fa-gift icon"></i>
                <span>Pacotes de Festas</span>
            </a>
            
            <a href="#" class="link-card animate-in">
                <i class="fa-solid fa-map-location-dot icon accent-red"></i>
                <span>Localização</span>
            </a>
            
            <a href="#" class="link-card animate-in">
                <i class="fa-brands fa-whatsapp icon"></i>
                <span>Fale no WhatsApp</span>
            </a>
            
            <a href="#" class="link-card animate-in">
                <i class="fa-regular fa-images icon"></i>
                <span>Galeria de Eventos</span>
            </a>
            
            <a href="#" class="link-card animate-in feedback">
                <i class="fa-solid fa-star icon accent-yellow"></i>
                <span>Avalie sua experiência de hoje</span>
            </a>
        </nav>

        <footer class="footer animate-in">
            <p>© 2026 Buffet de Luxo. Todos os direitos reservados.</p>
        </footer>
    </main>

    <script src="recursos/script.js"></script>
</body>
</html>
